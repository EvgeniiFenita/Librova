syntax = "proto3";

package librova.v1;

message ImportRequest {
  repeated string source_paths = 1;
  string working_directory = 2;
  optional string sha256_hex = 3;
  bool allow_probable_duplicates = 4;
}

enum BookFormat {
  BOOK_FORMAT_UNSPECIFIED = 0;
  BOOK_FORMAT_EPUB = 1;
  BOOK_FORMAT_FB2 = 2;
  BOOK_FORMAT_ZIP = 3;
}

enum BookSort {
  BOOK_SORT_UNSPECIFIED = 0;
  BOOK_SORT_TITLE = 1;
  BOOK_SORT_AUTHOR = 2;
  BOOK_SORT_DATE_ADDED = 3;
  BOOK_SORT_SERIES = 4;
  BOOK_SORT_YEAR = 5;
  BOOK_SORT_FILE_SIZE = 6;
}

enum ImportMode {
  IMPORT_MODE_UNSPECIFIED = 0;
  IMPORT_MODE_SINGLE_FILE = 1;
  IMPORT_MODE_ZIP_ARCHIVE = 2;
  IMPORT_MODE_BATCH = 3;
}

enum ImportJobStatus {
  IMPORT_JOB_STATUS_UNSPECIFIED = 0;
  IMPORT_JOB_STATUS_PENDING = 1;
  IMPORT_JOB_STATUS_RUNNING = 2;
  IMPORT_JOB_STATUS_COMPLETED = 3;
  IMPORT_JOB_STATUS_FAILED = 4;
  IMPORT_JOB_STATUS_CANCELLED = 5;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_VALIDATION = 1;
  ERROR_CODE_UNSUPPORTED_FORMAT = 2;
  ERROR_CODE_DUPLICATE_REJECTED = 3;
  ERROR_CODE_DUPLICATE_DECISION_REQUIRED = 4;
  ERROR_CODE_PARSER_FAILURE = 5;
  ERROR_CODE_CONVERTER_UNAVAILABLE = 6;
  ERROR_CODE_CONVERTER_FAILED = 7;
  ERROR_CODE_STORAGE_FAILURE = 8;
  ERROR_CODE_DATABASE_FAILURE = 9;
  ERROR_CODE_CANCELLATION = 10;
  ERROR_CODE_INTEGRITY_ISSUE = 11;
}

message DomainError {
  ErrorCode code = 1;
  string message = 2;
}

message ImportSummary {
  ImportMode mode = 1;
  uint64 total_entries = 2;
  uint64 imported_entries = 3;
  uint64 failed_entries = 4;
  uint64 skipped_entries = 5;
  repeated string warnings = 6;
}

message ImportJobSnapshot {
  uint64 job_id = 1;
  ImportJobStatus status = 2;
  int32 percent = 3;
  string message = 4;
  repeated string warnings = 5;
}

message ImportJobResult {
  ImportJobSnapshot snapshot = 1;
  ImportSummary summary = 2;
  optional DomainError error = 3;
}

message BookListRequest {
  string text = 1;
  optional string author = 2;
  optional string language = 3;
  optional string series = 4;
  repeated string tags = 5;
  optional BookFormat format = 6;
  optional BookSort sort_by = 7;
  uint64 offset = 8;
  uint64 limit = 9;
}

message BookListItem {
  int64 book_id = 1;
  string title = 2;
  repeated string authors = 3;
  string language = 4;
  optional string series = 5;
  optional double series_index = 6;
  optional int32 year = 7;
  repeated string tags = 8;
  BookFormat format = 9;
  string managed_path = 10;
  optional string cover_path = 11;
  uint64 size_bytes = 12;
  int64 added_at_unix_ms = 13;
}

message BookDetails {
  int64 book_id = 1;
  string title = 2;
  repeated string authors = 3;
  string language = 4;
  optional string series = 5;
  optional double series_index = 6;
  optional string publisher = 7;
  optional int32 year = 8;
  optional string isbn = 9;
  repeated string tags = 10;
  optional string description = 11;
  optional string identifier = 12;
  BookFormat format = 13;
  string managed_path = 14;
  optional string cover_path = 15;
  uint64 size_bytes = 16;
  string sha256_hex = 17;
  int64 added_at_unix_ms = 18;
}

message ListBooksRequest {
  BookListRequest query = 1;
}

message ListBooksResponse {
  repeated BookListItem items = 1;
}

message GetBookDetailsRequest {
  int64 book_id = 1;
}

message GetBookDetailsResponse {
  optional BookDetails details = 1;
}

message ExportBookRequest {
  int64 book_id = 1;
  string destination_path = 2;
}

message ExportBookResponse {
  optional string exported_path = 1;
}

message MoveBookToTrashRequest {
  int64 book_id = 1;
}

message MoveBookToTrashResponse {
  optional int64 trashed_book_id = 1;
}

message StartImportRequest {
  ImportRequest import = 1;
}

message StartImportResponse {
  uint64 job_id = 1;
}

message GetImportJobSnapshotRequest {
  uint64 job_id = 1;
}

message GetImportJobSnapshotResponse {
  optional ImportJobSnapshot snapshot = 1;
}

message GetImportJobResultRequest {
  uint64 job_id = 1;
}

message GetImportJobResultResponse {
  optional ImportJobResult result = 1;
}

message WaitImportJobRequest {
  uint64 job_id = 1;
  uint32 timeout_ms = 2;
}

message WaitImportJobResponse {
  bool completed = 1;
}

message CancelImportJobRequest {
  uint64 job_id = 1;
}

message CancelImportJobResponse {
  bool accepted = 1;
}

message RemoveImportJobRequest {
  uint64 job_id = 1;
}

message RemoveImportJobResponse {
  bool removed = 1;
}

service LibraryJobService {
  rpc StartImport(StartImportRequest) returns (StartImportResponse);
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse);
  rpc GetBookDetails(GetBookDetailsRequest) returns (GetBookDetailsResponse);
  rpc ExportBook(ExportBookRequest) returns (ExportBookResponse);
  rpc MoveBookToTrash(MoveBookToTrashRequest) returns (MoveBookToTrashResponse);
  rpc GetImportJobSnapshot(GetImportJobSnapshotRequest) returns (GetImportJobSnapshotResponse);
  rpc GetImportJobResult(GetImportJobResultRequest) returns (GetImportJobResultResponse);
  rpc WaitImportJob(WaitImportJobRequest) returns (WaitImportJobResponse);
  rpc CancelImportJob(CancelImportJobRequest) returns (CancelImportJobResponse);
  rpc RemoveImportJob(RemoveImportJobRequest) returns (RemoveImportJobResponse);
}
