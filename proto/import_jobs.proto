syntax = "proto3";

package librova.v1;

message ImportRequest {
  string source_path = 1;
  string working_directory = 2;
  optional string sha256_hex = 3;
  bool allow_probable_duplicates = 4;
}

enum ImportMode {
  IMPORT_MODE_UNSPECIFIED = 0;
  IMPORT_MODE_SINGLE_FILE = 1;
  IMPORT_MODE_ZIP_ARCHIVE = 2;
}

enum ImportJobStatus {
  IMPORT_JOB_STATUS_UNSPECIFIED = 0;
  IMPORT_JOB_STATUS_PENDING = 1;
  IMPORT_JOB_STATUS_RUNNING = 2;
  IMPORT_JOB_STATUS_COMPLETED = 3;
  IMPORT_JOB_STATUS_FAILED = 4;
  IMPORT_JOB_STATUS_CANCELLED = 5;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_VALIDATION = 1;
  ERROR_CODE_UNSUPPORTED_FORMAT = 2;
  ERROR_CODE_DUPLICATE_REJECTED = 3;
  ERROR_CODE_DUPLICATE_DECISION_REQUIRED = 4;
  ERROR_CODE_PARSER_FAILURE = 5;
  ERROR_CODE_CONVERTER_UNAVAILABLE = 6;
  ERROR_CODE_CONVERTER_FAILED = 7;
  ERROR_CODE_STORAGE_FAILURE = 8;
  ERROR_CODE_DATABASE_FAILURE = 9;
  ERROR_CODE_CANCELLATION = 10;
  ERROR_CODE_INTEGRITY_ISSUE = 11;
}

message DomainError {
  ErrorCode code = 1;
  string message = 2;
}

message ImportSummary {
  ImportMode mode = 1;
  uint64 total_entries = 2;
  uint64 imported_entries = 3;
  uint64 failed_entries = 4;
  uint64 skipped_entries = 5;
  repeated string warnings = 6;
}

message ImportJobSnapshot {
  uint64 job_id = 1;
  ImportJobStatus status = 2;
  int32 percent = 3;
  string message = 4;
  repeated string warnings = 5;
}

message ImportJobResult {
  ImportJobSnapshot snapshot = 1;
  ImportSummary summary = 2;
  optional DomainError error = 3;
}

message StartImportRequest {
  ImportRequest import = 1;
}

message StartImportResponse {
  uint64 job_id = 1;
}

message GetImportJobSnapshotRequest {
  uint64 job_id = 1;
}

message GetImportJobSnapshotResponse {
  optional ImportJobSnapshot snapshot = 1;
}

message GetImportJobResultRequest {
  uint64 job_id = 1;
}

message GetImportJobResultResponse {
  optional ImportJobResult result = 1;
}

message WaitImportJobRequest {
  uint64 job_id = 1;
  uint32 timeout_ms = 2;
}

message WaitImportJobResponse {
  bool completed = 1;
}

message CancelImportJobRequest {
  uint64 job_id = 1;
}

message CancelImportJobResponse {
  bool accepted = 1;
}

message RemoveImportJobRequest {
  uint64 job_id = 1;
}

message RemoveImportJobResponse {
  bool removed = 1;
}

service LibraryJobService {
  rpc StartImport(StartImportRequest) returns (StartImportResponse);
  rpc GetImportJobSnapshot(GetImportJobSnapshotRequest) returns (GetImportJobSnapshotResponse);
  rpc GetImportJobResult(GetImportJobResultRequest) returns (GetImportJobResultResponse);
  rpc WaitImportJob(WaitImportJobRequest) returns (WaitImportJobResponse);
  rpc CancelImportJob(CancelImportJobRequest) returns (CancelImportJobResponse);
  rpc RemoveImportJob(RemoveImportJobRequest) returns (RemoveImportJobResponse);
}
