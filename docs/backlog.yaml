meta:
  last_assigned_id: 194
tasks:
- id: 100
  summary: add RAR archive import support alongside the existing ZIP archive workflow
  status: Open
  type: Feature
  priority: Major
  milestone: unscheduled
  note: 'extend source selection, recursive directory discovery, and archive import handling so .rar files
    are accepted anywhere .zip is currently supported, with the same per-entry diagnostics, partial-success
    behavior, cancellation semantics, and duplicate handling as ZIP imports.

    '
- id: 128
  summary: 'add two explicit cancellation modes to the import dialog: Cancel and discard and Stop here'
  status: Open
  type: Feature
  priority: Major
  milestone: '1.3'
  note: 'currently a single Cancel button stops the pipeline with undefined semantics regarding already-imported
    books; replace it with two explicit actions — "Cancel and discard" rolls back and removes all books
    imported in the current batch, "Stop here" halts new processing but retains every book successfully
    imported so far; both buttons must be disabled and replaced with a "Cancelling…" indicator while the
    pipeline winds down, so the user cannot submit duplicate requests.

    '
- id: 68
  summary: add a Batch Convert to EPUB workflow for all managed FB2 books with aggregate progress and
    summary
  status: Open
  type: Feature
  priority: Major
  milestone: unscheduled
  note: The scenario is a user who already has an FB2 library and then configures a converter for the
    first time; a dedicated action (for example in Settings or the Library section) triggers conversion
    of every managed FB2 book; progress must surface the same aggregate counters as batch import (total,
    converted, failed, skipped); a per-book conversion failure must keep the original FB2 intact as the
    managed file - never remove it; the terminal summary must remain visible after the job finishes; cancellation
    must stop new conversions and leave already-converted books in their new EPUB state; the feature spans
    a new native pipeline stage, application facade contract, and Qt/QML workflow.
- id: 61
  summary: audit and harden browse, search, and filter query performance at library scales of hundreds
    of thousands of books
  status: Open
  type: Feature
  priority: Major
  milestone: unscheduled
  note: 'remaining performance scope after remediation-wave hardening is keyset pagination for deep browse,
    scalable author-sort/index strategy, FTS5 query-plan/tokenizer review, composite indexes aligned with
    browse filters, and explicit response-time budgets for browse/search/filter at 100k and 500k book
    scales.

    '
- id: 62
  summary: introduce platform service interfaces for all Windows-specific operations so non-Windows paths
    throw explicitly
  status: Open
  type: Feature
  priority: Major
  milestone: unscheduled
  note: Affected areas span the Recycle Bin service, the cover image processor (WIC/COM), DWM title-bar
    integration, and any remaining Windows-only Qt desktop helpers; each should be hidden behind an interface
    with a Windows-only implementation in a dedicated platform layer; non-Windows stubs must throw explicitly
    rather than fail silently or refuse to compile; where a portable third-party implementation is straightforward
    prefer it over a stub; the existing Unicode conversion guard is the reference pattern.
- id: 180
  summary: add live search suggestions dropdown to the library search field
  status: Open
  type: Feature
  priority: Major
  milestone: '1.3'
  note: 'Show a dropdown under the search input as the user types with debounce around 200 ms; two groups:
    top-5 author matches and top-5 title matches with eyebrow headers; highlight the matched substring
    in the accent style; keyboard navigation with Up/Down arrows, Enter to apply, Escape to close without
    clearing; the dropdown does not appear when there are no results; requires a new or extended native
    application facade and Qt adapter query for prefix search returning authors and titles separately.'
- id: 181
  summary: add library statistics dashboard as a dedicated sidebar section
  status: Open
  type: Feature
  priority: Major
  milestone: unscheduled
  note: 'Add a Statistics sidebar entry with a new icon; content: horizontal bar charts for top-5 genres,
    authors, languages, and a year histogram; each bar row shows label, proportional fill, and a count
    pill; section headers use the current eyebrow style; first load shows a skeleton instead of an empty
    screen; requires extending the native statistics DTO/query surface in C++ and exposing it through
    the Qt adapter.'
- id: 183
  summary: expose supported import file extensions from the native application facade for Qt drag-and-drop
  status: Open
  type: Feature
  priority: Minor
  milestone: unscheduled
  note: Qt import drag-and-drop should consume supported extension metadata from the native application
    surface instead of hardcoding format lists in QML.
- id: 131
  summary: replace import-stage sub-label with rotating book facts
  status: Open
  type: Feature
  priority: Low
  milestone: unscheduled
  note: 'the import card currently shows the internal processing stage for the current book (e.g. "Parsing
    metadata"); replace this sub-label with a rotating display picked from a curated set of ~100 short
    book-related facts (one sentence, fits the card width); shuffle the set per session, show each fact
    for a few seconds then advance; the fact display must be hidden once the import completes or is cancelled.

    '
- id: 64
  summary: allow the user to assign or replace a cover image for any managed book by selecting an image
    file from the filesystem
  status: Open
  type: Feature
  priority: Minor
  milestone: unscheduled
  note: the assigned image must pass through the existing cover processing pipeline (resize to the standard
    maximum dimensions and apply compression) before being stored beside the managed book bytes in the
    sharded Objects tree; the UI affordance should appear in the details panel and open a native file
    picker filtered to common image formats; the operation must update the cover reference in the database
    and immediately refresh the card and details panel; it must also be possible to clear an assigned
    cover so the book reverts to its generated placeholder.
- id: 143
  summary: 'CExternalBookConverter: batch mode via fbc directory/archive syntax'
  status: Open
  type: Feature
  priority: Minor
  milestone: unscheduled
  note: 'fbc supports ''fbc convert archive.zip/ outDir/'' — one process for N books. Prerequisite: IBookConverter
    needs SupportsGroupConversion()+ConvertGroup() extension points. Challenge: mixed-format archives
    require pre-filtering — only FB2 entries sent to batch. Match output EPUBs back to BookIds by title+author.
    Eliminates per-book CreateProcess overhead for EPUB conversion. Deferred from #60 to avoid complexity
    in the parallel import slice.'
- id: 177
  summary: show author text as second line on book card
  status: Open
  type: Feature
  priority: Minor
  milestone: '1.3'
  note: Authors text already exists on the book card model; render a secondary muted line under the title
    in BookCard.qml with ellipsis support; adjust the card height and responsive grid sizing so the extra
    line fits without visual distortion.
- id: 129
  summary: compact database after regular book deletions to reclaim FTS5 tombstone space
  status: Open
  type: Feature
  priority: Low
  milestone: unscheduled
  note: 'every Remove() call inserts an FTS5 tombstone that is never cleaned up unless Compact() is called;
    regular UI-driven deletions via LibraryTrashFacade never trigger compaction, so tombstones accumulate
    indefinitely (~1–2 KB per deleted book); decide on a strategy (threshold-based, background idle task,
    or per-batch) and implement it so FTS5 shadow-table space is reclaimed without blocking the UI.

    '
- id: 165
  summary: design and implement a coherent backlog CLI test pipeline
  status: Open
  type: Feature
  priority: Low
  milestone: unscheduled
  note: Replace the removed ad-hoc backlog test scaffolding with a documented, repository-consistent test
    pipeline for backlog tooling, including fixture strategy, runner choice, and mutating-command isolation.
- id: 174
  summary: show full truncated book title on hover in the Qt book card
  status: Open
  type: Feature
  priority: Low
  milestone: '1.3'
  note: When the title is visually elided in BookCard.qml, show the full title on hover with the standard
    Qt tooltip surface so it is readable without opening the details panel.
