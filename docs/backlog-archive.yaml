tasks:
- id: 1
  summary: unblock `Export` and `Move to Trash` after the first successful directory import
  status: Closed
  type: Bug
  priority: Major
  note: real-host UI integration coverage now exercises both actions immediately after directory import,
    closing the stale `Needs Reproduction` gap and keeping the reported manual scenario under regression
    protection.
- id: 2
  summary: restore live search filtering and full-list recovery after clearing the query
  status: Closed
  type: Bug
  priority: Major
  note: search now filters incrementally and restores the full list when the query is cleared.
- id: 3
  summary: display file sizes in megabytes instead of raw bytes
  status: Closed
  type: Feature
  priority: Minor
  note: all file size displays now show values in MB rounded to one decimal place.
- id: 4
  summary: remove the redundant top hero cards from tab pages
  status: Closed
  type: Feature
  priority: Minor
  note: hero cards removed from Library, Import, and Settings tab headers.
- id: 5
  summary: export books with a sanitized filename derived from title and author instead of the placeholder
    `book`
  status: Closed
  type: Feature
  priority: Major
  note: export now derives the output filename from title and author with path-safe sanitization.
- id: 6
  summary: keep the selected card visible when the details panel opens or closes by centering it in the
    visible viewport
  status: Closed
  type: Bug
  priority: Major
  note: the selected card is now scrolled into view when the details panel opens or closes.
- id: 7
  summary: show deterministic import progress for large folders, including total file count, processed
    count, and final outcome summary
  status: Closed
  type: Feature
  priority: Critical
  note: import now reports total, processed, and skipped/failed counts via progress events; UI shows a
    deterministic summary on completion.
- id: 8
  summary: increase spacing between `Select Files` and `Select Folder`
  status: Closed
  type: Feature
  priority: Minor
  note: gap between the two import action buttons increased to match the design grid.
- id: 9
  summary: unify primary action button styling, starting with `Select Files` and `Select Folder`
  status: Closed
  type: Feature
  priority: Minor
  note: both import buttons now use the unified `Button.AppPrimary` style.
- id: 10
  summary: 'add explicit search mode selection: title or author, defaulting to title'
  status: Closed
  type: Feature
  priority: Major
  note: superseded by the accepted global full-text search model that matches title, authors, tags, and
    description through one field.
- id: 11
  summary: define and enforce minimum window dimensions that preserve multiple visible cards and at least
    two columns with the details panel open
  status: Closed
  type: Feature
  priority: Major
  note: minimum window size is now enforced so the grid always shows at least two columns with the details
    panel open.
- id: 12
  summary: show current library book count and managed-book size total in megabytes, excluding the database
  status: Closed
  type: Feature
  priority: Major
  note: library sidebar now shows book count and managed-files size in MB, excluding the database file.
- id: 13
  summary: add a file-picker button for choosing the converter executable path
  status: Closed
  type: Feature
  priority: Minor
  note: Settings now shows a Browse button that opens a file-picker for the `fbc.exe` path.
- id: 14
  summary: remove the optional YAML config field for `fbc.exe` from the Settings UI
  status: Closed
  type: Feature
  priority: Minor
  note: YAML-based converter path configuration removed; path is now managed only through the UI preference.
- id: 15
  summary: wire configured `fbc.exe` / `fb2cng` usage into import and export flows, with `Export As EPUB`
    and forced-import-conversion UI affordances enabled only when the converter path is configured for
    the current session
  status: Closed
  type: Feature
  priority: Critical
  note: converter path is now read from preferences; Export As EPUB and forced-conversion options are
    gated on a non-empty path.
- id: 16
  summary: move `Settings` to the bottom of the left navigation rail
  status: Closed
  type: Feature
  priority: Minor
  note: Settings nav item repositioned to the bottom of the rail, separated from Library and Import.
- id: 17
  summary: replace the technical subtitle with a product-facing personal-library slogan
  status: Closed
  type: Feature
  priority: Minor
  note: startup subtitle updated to a user-facing personal library slogan.
- id: 18
  summary: restore the duplicate import opt-in and treat accepted duplicates as fully independent managed
    books
  status: Closed
  type: Feature
  priority: Major
  note: duplicate import is now opt-in; accepted duplicates are stored as independent managed entries.
- id: 19
  summary: rework the visual style around a modern dark media-app direction, covering palette, typography,
    and a unified icon set
  status: Closed
  type: Feature
  priority: Major
  note: completed in `apps/Librova.UI` with a unified dark shell, shared style tokens, refreshed iconography,
    and accepted manual UI verification across `Library`, `Import`, `Settings`, startup/recovery states,
    and the application icon.
- id: 20
  summary: add a stable hover state for book cards without layout jitter or text flicker
  status: Closed
  type: Bug
  priority: Major
  note: card hover is now stable with no layout shift or text flicker.
- id: 22
  summary: add an application icon for the window title bar and Windows taskbar
  status: Closed
  type: Feature
  priority: Minor
  note: '`.ico` asset added and registered; window title bar and taskbar now show the Librova book icon.'
- id: 23
  summary: keep cover aspect ratios intact and use a neutral card background instead of exposed color
    bands
  status: Closed
  type: Bug
  priority: Major
  note: covers now preserve aspect ratio with letterbox fill; color-band artifacts removed.
- id: 24
  summary: add per-file native host logging for skipped and failed entries during multi-file, directory,
    and ZIP imports so large import diagnostics do not depend only on UI summary warnings
  status: Closed
  type: Feature
  priority: Major
  note: native host now logs each skipped or failed file individually during batch and ZIP imports.
- id: 25
  summary: add Windows `Recycle Bin` integration as a first-class delete flow instead of limiting delete
    to the managed-library `Trash` area
  status: Closed
  type: Feature
  priority: Major
  note: delete now stages through managed `Trash` for rollback safety, hands staged files off to the Windows
    `Recycle Bin`, reports managed-`Trash` fallback explicitly if that handoff fails, and cleans up empty
    `Trash` subfolders after successful handoff.
- id: 26
  summary: complete first-class browser support for `genres` once metadata parsing and details display
    are in place
  status: Closed
  type: Feature
  priority: Major
  milestone: '1.1'
  note: 'закрыто в рамках #113 — жанровая фильтрация реализована полностью: proto repeated fields, SQL
    OR-семантика, FilterFacetItem VM, GenreFacets в LibraryBrowserViewModel, XAML Popup с multi-select;
    browse-time genre behavior полностью покрыт.'
- id: 27
  summary: complete release-candidate stabilization, diagnostics hardening, and manual verification
  status: Closed
  type: Feature
  priority: Major
  milestone: '1.0'
  note: completed the 1.0 stabilization pass with the remaining startup, import, cleanup, and diagnostics
    hardening fixes, and the release-candidate UI flow is now covered by confirmed manual testing.
- id: 28
  summary: downscale oversized imported covers before storing them in the managed library
  status: Closed
  type: Feature
  priority: Minor
  note: run cover optimization during import behind a native image-processing interface, keep aspect ratio,
    avoid upscaling, and keep the backend swappable so the initial Windows-only implementation does not
    leak into import policy.
- id: 29
  summary: replace fixed first-page library browsing with infinite scroll and total-result counts
  status: Closed
  type: Feature
  priority: Major
  note: the `Library` grid now appends additional pages on scroll, the counter shows the total matching
    result count instead of the currently loaded page size, language-filter options come from the full
    matching result set instead of only the already loaded cards, and delete refresh reloads the visible
    range in one read-side request instead of replaying paged RPC calls.
- id: 30
  summary: add a reproducible Windows portable release packaging flow that produces a fully runnable distribution
    folder for `Librova.UI` plus `Librova.Core.Host`, with every required runtime dependency either statically
    linked or copied into the output
  status: Closed
  type: Feature
  priority: Critical
  note: '`scripts/PublishPortable.ps1` is now the canonical Windows packaging flow. It publishes `Librova.UI`
    as a self-contained single-file `win-x64` executable, builds `Librova.Core.Host` through the `x64-release-static`
    preset so the host can ship as a single native `exe`, copies any remaining runtime dependencies into
    `out/package/win-x64-portable/`, and runs a portable smoke test before reporting success. The portable
    package now also keeps bootstrap UI state, preferences, and pre-library logs under `PortableData/`
    beside the executables instead of `%LOCALAPPDATA%`, while active library logs still move into `LibraryRoot/Logs`.
    The verified output currently contains `Librova.UI.exe`, `LibrovaCoreHostApp.exe`, and the Avalonia
    native runtime files `av_libglesv2.dll`, `libHarfBuzzSharp.dll`, and `libSkiaSharp.dll`.'
- id: 31
  summary: store managed `FB2` books in compressed form inside the library to reduce on-disk size, while
    preserving transparent browse, export, delete, duplicate-detection, and rollback behavior
  status: Closed
  type: Feature
  priority: Low
  note: completed as an internal managed-storage detail through persisted `storage_encoding`, with fallback-managed
    `FB2` compressed on import, transparently decoded on direct export and `Export As EPUB`, and library
    statistics now reflecting the real on-disk managed size.
- id: 32
  summary: expand the left `Current Library` summary so library size includes managed books, covers, and
    the SQLite database instead of only managed-book files
  status: Closed
  type: Feature
  priority: Minor
  note: 'the shell keeps one aggregate `Library: ...` size metric, and the statistics flow now aligns
    on total library size rather than a managed-books-only total.'
- id: 33
  summary: harden `CoreHostProcess` command-line quoting so core startup survives Windows paths with trailing
    backslashes and embedded quotes
  status: Closed
  type: Bug
  priority: Critical
  note: '`CoreHostProcess` now escapes launch arguments with Windows-correct `CommandLineToArgvW` rules,
    and UI-side regression coverage verifies trailing `\`, embedded `"`, and Cyrillic paths through a
    real parse round-trip.'
- id: 34
  summary: extend metadata normalization beyond Russian-only case folding so search and duplicate detection
    stay correct for broader Cyrillic text
  status: Closed
  type: Bug
  priority: Major
  note: the shared metadata normalizer now lowercases extended Cyrillic code points including `І/і`, `Ї/ї`,
    `Є/є`, and `Ў/ў`, and regression coverage now proves both SQLite FTS search-index matching and probable-duplicate
    keys stay case-insensitive for those inputs.
- id: 35
  summary: replace full-library probable-duplicate scans with indexed or query-level duplicate lookup
  status: Closed
  type: Feature
  priority: Major
  note: '`SqliteBookQueryRepository::FindDuplicates` now keeps duplicate detection on one SQLite connection,
    narrows probable-duplicate candidates through an exact normalized-author-set query instead of reading
    the full library into memory, and preserves strict/probable semantics under regression tests including
    full author-set matching and multiple-match cases.'
- id: 36
  summary: separate language-list SQL binding from count-query binding in `SqliteBookQueryRepository`
  status: Closed
  type: Bug
  priority: Major
  note: '`ListAvailableLanguages` now uses its own binder that matches the language-list SQL shape instead
    of reusing count-query binding with a phantom `language` parameter, and regression coverage now keeps
    combined `Series` / `Tags` / `Format` filters correct even when the current language filter is populated.'
- id: 37
  summary: remove fixed-sleep readiness from named-pipe tests and replace it with deterministic synchronization
  status: Closed
  type: Bug
  priority: Major
  note: named-pipe channel, host, and client tests now wait on explicit server-ready signaling before
    connecting instead of relying on `sleep_for(20ms)`, keeping IPC verification deterministic and aligned
    with the repository rule against fixed waits.
- id: 38
  summary: make converter argument template expansion single-pass so literal placeholder text inside file
    paths is preserved
  status: Closed
  type: Bug
  priority: Major
  note: converter argument expansion now resolves placeholders in one explicit pass instead of repeatedly
    re-running replacement over already expanded text, and regression coverage now preserves literal `{output_format}`-style
    fragments when they appear inside source or destination paths.
- id: 39
  summary: show the application version in the UI and define it in exactly one source of truth
  status: Closed
  type: Feature
  priority: Minor
  note: '`Settings` now shows the current application version, and both native `Core::Version` plus managed
    assembly metadata read it from the shared repository-root `VERSION.txt` file instead of duplicated
    per-project constants.'
- id: 40
  summary: parse `series` and `genres` from `FB2` / `EPUB` and show them in book details
  status: Closed
  type: Feature
  priority: Major
  note: '`FB2` parsing now extracts `<genre>` plus `sequence`, `EPUB` parsing now extracts `dc:subject`
    plus collection-based series metadata, and real-host/UI regressions keep those fields visible in the
    `Library` details panel while browse-time filtering remains tracked under `#26`.'
- id: 41
  summary: remove custom EPUB converter support and keep only built-in `fbc` / `fb2cng` configuration
  status: Closed
  type: Feature
  priority: Minor
  note: the custom converter mode, arguments, and host flags are removed across settings, preferences,
    launch options, native converter configuration, and related tests; `Settings` now exposes only the
    built-in `fbc.exe` path while empty path cleanly disables EPUB conversion.
- id: 42
  summary: make compressed managed `FB2` storage visibly distinct from plain `.fb2` files inside the library
  status: Closed
  type: Feature
  priority: Minor
  milestone: '1.1'
  note: compressed managed FB2 files now use the `.fb2.gz` extension instead of `.fb2`; implemented via
    an encoding-aware overload of `GetManagedFileName` and `GetManagedBookPath`; export and decompression
    are unaffected since they use the `storage_encoding` database column, not the file extension.
- id: 43
  summary: show explicit busy or progress feedback during long-running `Export As EPUB` operations
  status: Closed
  type: Feature
  priority: Low
  note: added `IsExportBusy` property to `LibraryBrowserViewModel`; details panel now shows an indeterminate
    progress bar and status text while any export is in flight; EPUB export timeout increased to 2 min
    transport / 3 min outer to accommodate decompression and external converter time; regular export timeout
    set to 10 s / 30 s; regression test verifies `IsExportBusy` transitions during a gated export.
- id: 44
  summary: store managed book and cover paths as stable library-relative values instead of absolute filesystem
    paths
  status: Closed
  type: Bug
  priority: Critical
  milestone: '1.0'
  note: fixed import coordinator to write `RelativeBookPath`/`RelativeCoverPath` (computed via `std::filesystem::relative`)
    into `SBook` instead of absolute `FinalBookPath`/`FinalCoverPath`; consolidated duplicated `IsSafeRelativeManagedPath`
    helper into `ManagedPathSafety`; regression tests added.
- id: 45
  summary: prevent managed-trash cleanup from deleting required top-level library directories such as
    `Covers`
  status: Closed
  type: Bug
  priority: Low
  note: '`CleanupEmptyParentDirectory` in `ManagedTrashService` now skips removal when the parent is a
    direct child of the library root; canonical root is computed once in the constructor and passed to
    the cleanup helper; two regression tests cover both the protection of `Covers/` and the allowed removal
    of per-book subdirectories.'
- id: 46
  summary: make staged delete crash-safe across filesystem moves and catalog removal
  status: Closed
  type: Bug
  priority: Critical
  milestone: '1.0'
  note: reversed delete ordering — catalog removal (DB) is now the commit point; file moves to Trash happen
    after and are best-effort with orphan logging on failure; regression tests updated.
- id: 47
  summary: harden duplicate protection against concurrent imports with database-level enforcement
  status: Closed
  type: Bug
  priority: Critical
  milestone: '1.0'
  note: '`Add()` now re-checks sha256_hex inside a `BEGIN IMMEDIATE` transaction and throws `CDuplicateHashException`
    on conflict; `ForceAdd()` bypasses the check for explicit duplicate overrides; coordinator catches
    the exception and either rejects or force-inserts based on `AllowProbableDuplicates`; `ForceAdd` made
    pure virtual to enforce explicit implementation in all mocks; double-warning guard added; regression
    tests cover conflict detection, force-add path, empty-hash no-throw, and rollback correctness.'
- id: 48
  summary: compute and propagate SHA-256 for batch and ZIP imports so strict duplicate detection works
    beyond single-source manual requests
  status: Closed
  type: Bug
  priority: Critical
  milestone: '1.0'
  note: added `libs/Hashing` slice with `ComputeFileSha256Hex` backed by Windows BCrypt API; `SingleFileImportCoordinator`
    now computes SHA-256 from the source file when the caller does not provide one, so all import paths
    (single-file, batch, ZIP) participate in hash-based duplicate detection; regression tests added for
    both the hash utility and the coordinator's auto-compute path.
- id: 49
  summary: reject databases created by a newer schema version instead of silently downgrading `user_version`
  status: Closed
  type: Bug
  priority: Low
  note: '`CSchemaMigrator::Migrate` now throws `std::runtime_error` with the detected and expected versions
    when `currentVersion > GetCurrentVersion()`; `user_version` is never overwritten in that path; regression
    test verifies both the throw and that the future version is preserved on disk.'
- id: 50
  summary: replace whole-file bootstrap log merging with streamed copy during UI log reinitialization
  status: Closed
  type: Bug
  priority: Minor
  note: '`ReinitializeUnsafe` now opens the previous log as a read `FileStream` and copies it into the
    destination via `Stream.CopyTo` instead of `File.ReadAllText` + `File.AppendAllText`; regression test
    verifies 5000-line bootstrap log is fully merged without truncation.'
- id: 51
  summary: save UI preferences atomically so interrupted writes do not corrupt the preferences file
  status: Closed
  type: Bug
  priority: Minor
  note: '`UiPreferencesStore.Save` now writes JSON to a sibling `.tmp` file then calls `File.Move(...,
    overwrite: true)` for an atomic replace; added regression tests for double-save overwrite correctness
    and `TryLoad` resilience against corrupted JSON.'
- id: 52
  summary: validate IPC-provided cover paths against the active library root on the UI side before file
    IO
  status: Closed
  type: Bug
  priority: Minor
  note: '`LibraryBrowserViewModel.LoadCoverImage()` now resolves the final path and rejects it via `IsWithinLibraryRoot()`
    before any file IO; absolute out-of-root paths and relative path-traversal attempts both return `null`
    with a warning log; two regression tests added.'
- id: 53
  summary: fail fast on unexpected `BOOK_FORMAT_ZIP` or unknown catalog format values instead of silently
    mapping them to `EPUB`
  status: Closed
  type: Bug
  priority: Low
  note: '`FromProto(BookFormat)` in `LibraryCatalogProtoMapper` now explicitly rejects `BOOK_FORMAT_ZIP`,
    `BOOK_FORMAT_UNSPECIFIED`, and any unknown numeric value with an error log and `std::invalid_argument`;
    three regression tests cover the ZIP case via `BookListRequest`, via `ExportBookRequest`, and via
    an unknown numeric cast.'
- id: 54
  summary: replace the version-only line in Settings with a styled About card showing version, author
    name, and contact email
  status: Closed
  type: Feature
  priority: Minor
  note: '`Settings` now shows an `AppPanelCompact` About card with the Librova book icon, version, author
    name, and contact email; `ApplicationVersion` gained `Author` and `ContactEmail` static constants;
    `ShellViewModel` exposes `ApplicationAuthorText` and `ApplicationContactEmailText`; regression assertions
    added to the existing `ShellApplication` test.'
- id: 55
  summary: open the main window on the Import tab after first-run library creation
  status: Closed
  type: Feature
  priority: Minor
  note: '`ShellViewModel` constructor now checks `session.HostOptions.LibraryOpenMode`; when `CreateNew`,
    `_currentSection` is set to `ShellSection.Import` instead of the default `Library`; regression test
    `Create_WithCreateNewOpenMode_DefaultsToImportSection` added to `ShellApplicationTests`.'
- id: 56
  summary: dim the Library card in the sidebar during active import to match the disabled state of other
    sidebar elements
  status: Closed
  type: Feature
  priority: Minor
  note: 'added `IsEnabled="{Binding Shell.IsImportInProgress, Converter={x:Static BoolConverters.Not}}"`
    on the Library card `Border` in `MainWindow.axaml`; added `Border.AppPanelMuted:disabled { Opacity:
    0.45 }` to the GLOBAL DISABLED OPACITY section of `Components.axaml` — consistent with `Button.NavItem:disabled`
    opacity.'
- id: 57
  summary: disable the import options panel (Allow duplicate import, Force conversion to EPUB) during
    active import
  status: Closed
  type: Feature
  priority: Minor
  note: 'added `IsEnabled="{Binding ImportJobs.IsBusy, Converter={x:Static BoolConverters.Not}}"` on the
    OPTIONS `Border.AppPanelMuted` in `ImportView.axaml`; the existing `Border.AppPanelMuted:disabled
    { Opacity: 0.45 }` style (added in #56) handles visual dimming; both checkboxes are disabled via parent
    `IsEnabled` propagation.'
- id: 58
  summary: expose sort controls in the Library section and wire them to the existing backend sort implementation
  status: Closed
  type: Feature
  priority: Major
  milestone: '1.0'
  note: added `SortKeyOption` record and `AvailableSortKeys` to `LibraryCatalogModels`; wired `SelectedSortKey`
    state and `initialSortKey` constructor param into `LibraryBrowserViewModel`; updated `BuildRequest`/`BuildInitialRangeRequest`
    to pass `SortBy`; added sort `ComboBox` (`AppComboBox` class) to the Library toolbar with scroll-reset
    on change; persists and restores sort preference across sessions via `UiPreferencesSnapshot.PreferredSortKey`;
    preservation across library-root switches handled in `UiPreferencesSnapshotBuilder`.
- id: 63
  summary: normalize FB2 genre codes to human-readable English names at import time so the database stores
    display-ready strings rather than raw format-specific codes
  status: Closed
  type: Feature
  priority: Major
  milestone: '1.1'
  note: superseded by and closed as part of `#116`; FB2 genre codes are now resolved to human-readable
    English names at parse time via `CFb2GenreMapper` and stored in the `genres`/`book_genres` tables
    with `source_type = 'fb2_genre'`.
- id: 66
  summary: validate a configured converter by running a test conversion when the user saves converter
    settings
  status: Closed
  type: Feature
  priority: Major
  milestone: '1.0'
  note: added `Fb2ConverterProbe` (static C# class with 500 ms debounce) that writes a minimal embedded
    FB2 to a temp directory, runs `fb2cng convert --to epub2 --overwrite` with a 5 s timeout, and checks
    exit code plus output file; wired into `ShellViewModel` as an injectable delegate (`_converterProbe`);
    `IsConverterProbeInProgress` disables Save while the probe runs; on failure the validation message
    is shown in the existing error TextBlock and Save stays disabled; empty path clears the error immediately
    without running the probe; added `ConverterProbeStatusText` and a neutral status TextBlock in `SettingsView.axaml`;
    6 new managed tests cover all probe outcome paths.
- id: 67
  summary: add a Remove Converter button to Settings so the user can clear the configured converter in
    one action
  status: Closed
  type: Feature
  priority: Minor
  milestone: '1.1'
  note: replaced the manual Save button with auto-save on successful probe completion or path clear; added
    an inline × (IconActionSm) button that clears the converter path; settings now apply automatically
    after validation without requiring an explicit save action.
- id: 69
  summary: block drag-and-drop import while another import job is already running
  status: Closed
  type: Bug
  priority: Major
  milestone: '1.0'
  note: window-level drag-and-drop now rejects new sources during active import, the drop zone dims with
    the rest of the import lock-out state, and a regression test keeps the running source text stable
    until the current job finishes.
- id: 70
  summary: harden import cancellation rollback so partial rollback failures cannot leave the library in
    a half-removed state
  status: Closed
  type: Bug
  priority: Critical
  milestone: '1.0'
  note: cancellation rollback now removes catalog rows before best-effort file cleanup, preserves fully
    intact books when repository removal fails, and adds a regression test for repository failure during
    rollback.
- id: 71
  summary: reject cover-image paths that escape the active library root through symlinks or junctions
    before the UI attempts to load them
  status: Closed
  type: Bug
  priority: Major
  milestone: '1.0'
  note: cover loading now canonicalizes existing paths through reparse-point resolution before root comparison,
    and managed UI regression coverage rejects a junction-based escape from the active library root.
- id: 72
  summary: replace raw Win32 handle management in `CoreHostProcess` with `SafeHandle`-backed lifetime
    management and failure-path verification
  status: Closed
  type: Bug
  priority: Major
  milestone: '1.0'
  note: '`CoreHostProcess` now owns shutdown-event and job-object handles through `SafeHandle`, releases
    both handles even when no process was assigned, and adds a regression test for the no-process cleanup
    path.'
- id: 73
  summary: reduce orchestration sprawl in the shell and library browser view-models by extracting non-UI
    responsibilities into focused helpers without changing behavior
  status: Closed
  type: Feature
  priority: Major
  milestone: '1.0'
  note: extracted converter-probe lifecycle and cover/path-resolution into dedicated UI collaborators,
    keeping shell and library browser behavior unchanged while adding startup regression coverage for
    saved converter settings.
- id: 74
  summary: fix `ImportJobsViewModel` success-notification flow so async subscribers are invoked deterministically
    and covered by tests
  status: Closed
  type: Bug
  priority: Major
  milestone: '1.0'
  note: import success notifications now use an explicit result-carrying async handler contract, await
    every subscriber sequentially, and include multi-subscriber regression coverage.
- id: 75
  summary: audit silent cleanup and rollback catch-all handlers and replace the actionable ones with structured
    diagnostics
  status: Closed
  type: Bug
  priority: Major
  milestone: '1.0'
  note: actionable cleanup failures in import rollback, managed-storage restore, and trash diagnostics
    now emit structured warnings, with native regression coverage for rollback cleanup logging.
- id: 76
  summary: make portable installs reopen moved libraries and let first-run open an existing managed library
  status: Closed
  type: Bug
  priority: Critical
  milestone: '1.0'
  note: portable preferences now save a relocatable library-root hint for packaged runs, startup reopens
    the moved library from that relative path, and first-run setup can explicitly either create a new
    library or open an existing managed one.
- id: 77
  summary: fix the remaining April 8 review findings across rollback, delete status messaging, converter-probe
    lifecycle, and cover helper safety
  status: Closed
  type: Bug
  priority: Major
  milestone: '1.0'
  note: import cancellation rollback now survives repository lookup failures, delete status text no longer
    falsely claims library Trash moves, pending converter probes are canceled on shell disposal, and cover
    placeholder palette selection is safe for all hash values.
- id: 78
  summary: make delete/trash resilient when managed book files or covers are already missing from the
    library
  status: Closed
  type: Bug
  priority: Critical
  milestone: '1.0'
  note: damaged-library deletes now treat missing managed book or cover files as best-effort cleanup residue,
    still remove the catalog row, and report `HasOrphanedFiles` with regression coverage for both missing-file
    cases.
- id: 79
